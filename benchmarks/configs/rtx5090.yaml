# RTX 5090 (consumer baseline)
#
# Schema (one GPU = one yaml):
#   models:          one block per candidate model. Keys = stable ids.
#                    `backend_args` is the rare per-backend launch flag a
#                    model needs (e.g. runtime quant when the weights are
#                    BF16 but the runtime should load them as FP8/NVFP4).
#   default_model:   pointer into `models`. Single-run target — change this
#                    one line and re-run to swap the model on all backends.
#   backends:        launcher params (HTTP url, port, extra_args).
#                    `variants` are additive flag sets used by sweeps and
#                    by `--variant <name>` for one-off comparisons.
#   sweeps:          named ordered lists of rounds. Run via `--sweep <name>`.
#   aux:             placeholder blocks for tools wired up later.
#
# See docs/models.md for per-GPU pick rationale, docs/capacity.md for fit.

display_name: "GeForce RTX 5090"
arch: blackwell
vram_gb: 32
mem_type: GDDR7
peak_bandwidth_tbps: 1.79
nvlink: false
pcie_gen: 5

driver: "unknown"             # filled in by scripts/gpu_probe.sh
cuda: "unknown"

tensor_parallel: 1            # 5090 has no NVLink — TP=2 is an experiment

# ─── Models ────────────────────────────────────────────────────────────
# 5090 has 22 GB usable for weights (32 GB - ~30% KV/vision/framework).
# FP8 is the production-style default; NVFP4 is needed for ≥30B models
# because nothing else fits.
models:
  qwen3-vl-8b-fp8:
    hf_id: "Qwen/Qwen3-VL-8B-Instruct-FP8"
    family: "qwen3-vl"
    role: "vlm-headline"
    quantization: "fp8"
    notes: "Only Qwen3-VL size that fits 32GB with KV/vision headroom."
    # ~9GB weights leave ~16GB for KV at 0.9 util — 32K is comfortable.
    # `--no-enable-prefix-caching`: Qwen3-VL deepstack/chunked-prefill bug
    # (see SMOKE_TESTS.md). Remove once upstream fixes.
    backend_args:
      vllm: ["--max-model-len=32768", "--no-enable-prefix-caching"]
      sglang: ["--context-length=32768"]

  qwen3-vl-30b-a3b-nvfp4:
    hf_id: "Qwen/Qwen3-VL-30B-A3B-Instruct"
    family: "qwen3-vl"
    role: "vlm-moe"
    quantization: "nvfp4"
    notes: "MoE squeezed into 32GB via Blackwell-native NVFP4 (~21GB at load). Tight — verify before relying on. FP8 (31GB) starves KV."
    # NVFP4 weights ~21GB on a 32GB card → only ~5GB for KV. 8K cap is
    # conservative to ensure startup; bump if KV headroom turns out to be
    # larger than expected in practice.
    backend_args:
      vllm: ["--quantization=nvfp4", "--max-model-len=8192", "--no-enable-prefix-caching"]
      sglang: ["--quantization=nvfp4", "--context-length=8192"]
      trtllm: []   # quant configured via benchmarks/configs/trtllm-vlm.yml when wired up

  qwen3.5-9b:
    hf_id: "Qwen/Qwen3.5-9B"
    family: "qwen3.5"
    role: "dense-text"
    quantization: "fp8"
    notes: "Smallest dense Qwen3.x. Aspirationally a TRT-engine candidate, but TRT-LLM 1.2.1 cannot load it yet — see comment below."
    # BF16 weights asked to load as FP8 at runtime (no `…-FP8` checkpoint
    # ships upstream yet). Switch to direct FP8 load if Qwen ever publishes one.
    # Text-only model — prefix caching stays on (vLLM default).
    #
    # ⚠ TRT-LLM 1.2.1 incompatibility: the checkpoint reports model_type
    # `qwen3_5` (hybrid attention + Mamba/SSM). TRT-LLM's transformers
    # build doesn't register that arch, so loading fails with
    # `KeyError: 'qwen3_5'`. See docs/findings/qwen3.6-on-trtllm.md.
    unsupported_backends:
      trtllm: "TRT-LLM 1.2.1 transformers registry missing qwen3_5 arch (KeyError on load)"
    backend_args:
      vllm: ["--quantization=fp8", "--max-model-len=32768"]
      sglang: ["--quantization=fp8", "--context-length=32768"]

  nemotron-omni-nvfp4:
    hf_id: "nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4"
    family: "nemotron"
    role: "nv-multimodal-moe"
    quantization: "nvfp4"
    notes: "NV-tuned multimodal MoE; NVFP4 is the only quant that fits 32GB. Calibrated NVFP4 checkpoint published by NVIDIA — no runtime quant needed."
    # Same tight-KV math as the Qwen3-VL 30B-A3B-NVFP4 above. 8K cap.
    # Different multimodal arch from Qwen3-VL — prefix caching stays on (vLLM default).
    # HF repo ships custom modeling code; vLLM and SGLang refuse to load
    # without --trust-remote-code (HF default is off).
    # First-run cold cache: ~280s download + ~150s safetensors load + compile
    # blew past the 600s default on FP8. NVFP4 weights are smaller but pad
    # the budget anyway; warm cache reruns finish in ~120s.
    ready_timeout_s: 1800
    # --no-enable-flashinfer-autotune: see rtx_pro6000.yaml. RTX 5090 is also
    # SM_120 (consumer Blackwell); same flashinfer cuBLASLt-baseline bug hits
    # this GPU. Disabling autotune lets the SM_120 cutlass path run directly.
    #
    # ⚠ sglang incompatible on this GPU: fused-MoE triton kernel asks for
    # 147 KB shared memory per SM but SM_120 only has ~100 KB; no tuning
    # config exists for RTX 5090 either. (See rtx_pro6000.yaml for full
    # diagnosis.)
    #
    # ⚠ trtllm 1.2.1 incompatible: PyTorch backend doesn't register
    # `NemotronH_Nano_Omni_Reasoning_V3` arch — fails to init executor.
    # GPU-independent gap; same class of issue as the qwen3_5 arch.
    #
    # Net effect: only vllm works on this GPU.
    unsupported_backends:
      sglang: "Triton fused-MoE asks 147KB shmem on modelopt FP8/NVFP4; SM_120 has ~100KB → OutOfResources at JIT"
      trtllm: "TRT-LLM 1.2.1 PyTorch backend rejects NemotronH_Nano_Omni_Reasoning_V3 arch"
    backend_args:
      vllm: ["--max-model-len=8192", "--trust-remote-code", "--no-enable-flashinfer-autotune"]
      sglang: ["--context-length=8192", "--trust-remote-code"]

  # ─── NitroGen policy "models" ──────────────────────────────────────────
  # Same 500M checkpoint at different precision/denoise steps. 5090 is Blackwell
  # (SM_120): FP8 + NVFP4 both available; 500M fits 32GB with room to spare.
  nitrogen-500m-bf16:
    family: "nitrogen"
    role: "policy-reference"
    quantization: "bf16"
    notes: "BF16 reference; accuracy-vs-gold baseline."
    backend_args:
      nitrogen: ["--precision=bf16", "--steps=16"]
  nitrogen-500m-fp8:
    family: "nitrogen"
    role: "policy-quant"
    quantization: "fp8"
    notes: "FP8 quant of DiT + vision tower."
    backend_args:
      nitrogen: ["--precision=fp8", "--steps=16"]
  nitrogen-500m-fp8-4step:
    family: "nitrogen"
    role: "policy-quant-fast"
    quantization: "fp8"
    notes: "FP8 + 4 denoise steps — latency floor."
    backend_args:
      nitrogen: ["--precision=fp8", "--steps=4"]
  nitrogen-500m-nvfp4:
    family: "nitrogen"
    role: "policy-quant-blackwell"
    quantization: "nvfp4"
    notes: "NVFP4 — Blackwell-native 4-bit float."
    backend_args:
      nitrogen: ["--precision=nvfp4", "--steps=16"]

# Headline model for ad-hoc single runs. Sweeps below override this per round.
default_model: qwen3-vl-8b-fp8

# ─── Backends ──────────────────────────────────────────────────────────
backends:
  vllm:
    base_url: "http://localhost:8000/v1"
    port: 8000
    # Backend-level args here are GPU-shape-only (memory ceiling +
    # concurrency hint). Anything model-specific lives on
    # `models.<id>.backend_args.vllm`:
    #   --max-model-len     — per-model, since the cap depends on weight
    #                         footprint vs. this GPU's 32 GB.
    #   --no-enable-prefix-caching
    #                       — per-model. vLLM default is ON. Qwen3-VL hits
    #                         a deepstack/chunked-prefill bug; we disable
    #                         on those models specifically. Other models
    #                         (Nemotron Omni, Qwen3.5-9B) stay on default.
    #   --quantization      — per-model runtime override (used here for
    #                         Qwen3.5-9B BF16 → FP8 since no FP8 checkpoint
    #                         ships upstream yet).
    extra_args:
      - "--gpu-memory-utilization=0.90"
      - "--max-num-seqs=32"
    variants:
      eager: ["--enforce-eager"]
      chunked_off: ["--no-enable-chunked-prefill"]

  sglang:
    base_url: "http://localhost:30000/v1"
    port: 30000
    extra_args: []
    variants: {}

  # NitroGen diffusion-policy backend — ZMQ, served by scripts/serve_nitrogen.py.
  # `variants` select the execution backend (the optimization knob).
  nitrogen:
    transport: zmq
    base_url: "tcp://localhost:5555"
    port: 5555
    ckpt: "nvidia/NitroGen:ng.pt"
    extra_args: ["--seed=0"]
    variants:
      eager:     ["--exec=eager"]
      compile:   ["--exec=compile"]
      cudagraph: ["--exec=cudagraph"]
      trt:       ["--exec=tensorrt"]
      onnx:      ["--exec=onnxruntime"]

  trtllm:
    base_url: "http://localhost:8002/v1"
    port: 8002
    # `backend:` selects the trtllm-serve execution path. Allowed values:
    #   pytorch     — PyTorch dispatch (HF weights direct; only path that
    #                 supports day-0 multimodal models like Qwen3-VL / Nemotron).
    #   trtllm      — AOT-compiled TRT engine (legacy; multimodal coverage
    #                 limited). Maps to trtllm-serve `--backend tensorrt`.
    #   _autodeploy — experimental; not for headline runs.
    backend: pytorch
    extra_args:
      - "--extra_llm_api_options=benchmarks/configs/trtllm-vlm.yml"
    variants: {}

# ─── Sweeps ────────────────────────────────────────────────────────────
# A sweep is a named ordered list of rounds. Each round can set:
#   model:    id from `models:` (defaults to `default_model`)
#   variant:  variant name from `backends.<backend>.variants` (defaults to none)
# Optional `backends:` field on the sweep limits which backends each round
# runs on; default is all three.
sweeps:
  # All four candidate models on all three backends. 4 × 3 = 12 runs.
  models:
    rounds:
      # Per-(model, backend) incompatibility lives on each model's
      # `unsupported_backends:` field; sweep mode silently skips those.
      - model: qwen3-vl-8b-fp8
      - model: qwen3-vl-30b-a3b-nvfp4
      - model: qwen3.5-9b
      - model: nemotron-omni-nvfp4
        backends: [vllm]   # sglang OOMs on SM_120, trtllm 1.2.1 rejects arch (see model entry)

  # vllm flag-knob comparison on the default model. 3 vllm runs.
  vllm_knobs:
    backends: [vllm]
    rounds:
      - {}
      - variant: eager
      - variant: chunked_off

  # NitroGen inference-optimization study (Blackwell: includes NVFP4 round).
  #   python -m benchmarks.runner --gpu rtx5090 --sweep nitrogen-backends \
  #       --scenarios-dir tests/smoke/scenarios_nitrogen
  nitrogen-backends:
    backends: [nitrogen]
    rounds:
      - {model: nitrogen-500m-bf16, variant: eager}        # reference
      - {model: nitrogen-500m-bf16, variant: compile}
      - {model: nitrogen-500m-bf16, variant: cudagraph}
      - {model: nitrogen-500m-fp8,  variant: trt}
      - {model: nitrogen-500m-fp8,  variant: onnx}
      - {model: nitrogen-500m-fp8-4step, variant: trt}
      - {model: nitrogen-500m-nvfp4, variant: trt}

  # Mixed matrix.
  full:
    rounds:
      - {model: qwen3-vl-8b-fp8}
      - {model: qwen3-vl-8b-fp8,         variant: eager,       backends: [vllm]}
      - {model: qwen3-vl-8b-fp8,         variant: chunked_off, backends: [vllm]}
      - {model: qwen3-vl-30b-a3b-nvfp4}
      - {model: qwen3.5-9b}            # trtllm dropped via unsupported_backends
      - {model: nemotron-omni-nvfp4}   # sglang+trtllm dropped via unsupported_backends

# ─── Aux ───────────────────────────────────────────────────────────────
# Placeholder blocks for tools wired up later. Not read by the runner today.
aux:
  modelopt:
    quant: nvfp4
    calibration_samples: 256
  triton:
    grpc_url: "localhost:8001"
    ensemble_name: "vlm_pipeline_ensemble"
