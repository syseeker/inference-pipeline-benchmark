# RTX PRO 6000 Blackwell (Server Edition)
#
# Schema (one GPU = one yaml):
#   models:          one block per candidate model. Keys = stable ids.
#                    `backend_args` is the rare per-backend launch flag a
#                    model needs (e.g. runtime quant when the weights are
#                    BF16 but the runtime should load them as FP8).
#   default_model:   pointer into `models`. Single-run target — change this
#                    one line and re-run to swap the model on all backends.
#   backends:        launcher params (HTTP url, port, extra_args).
#                    `variants` are additive flag sets used by sweeps and
#                    by `--variant <name>` for one-off comparisons.
#   sweeps:          named ordered lists of rounds. The runner iterates
#                    each round across the listed backends. Use sweeps to
#                    auto-run multi-model or multi-variant benchmarks in
#                    one session. Run via `--sweep <name>`.
#   aux:             placeholder blocks for tools wired up later.
#
# See docs/models.md for per-GPU pick rationale, docs/capacity.md for fit.

display_name: "RTX PRO 6000 Blackwell Server Edition"
arch: blackwell
vram_gb: 96
mem_type: GDDR7
peak_bandwidth_tbps: 1.6      # check vs. datasheet at run time
nvlink: false
pcie_gen: 5
mig_supported: true

driver: "unknown"             # filled in by scripts/gpu_probe.sh
cuda: "unknown"

tensor_parallel: 1

# ─── Models ────────────────────────────────────────────────────────────
# All HF ids — vllm, sglang, and trtllm-serve all pull on first launch
# into $HF_HOME (default ~/.cache/huggingface/hub/) and share the cache.
models:
  qwen3-vl-32b-fp8:
    hf_id: "Qwen/Qwen3-VL-32B-Instruct-FP8"
    family: "qwen3-vl"
    role: "vlm-headline"
    quantization: "fp8"
    notes: "33GB weights + comfortable KV/ctx room on 96GB."
    # 32K cap: model's HF default is 256K, KV reservation for that won't fit
    # on 96GB next to 33GB weights. 32K is 16x our scenario prompts.
    # `--no-enable-prefix-caching`: Qwen3-VL deepstack + chunked prefill
    # bug; remove once upstream fixes (see SMOKE_TESTS.md).
    backend_args:
      vllm: ["--max-model-len=32768", "--no-enable-prefix-caching"]
      sglang: ["--context-length=32768"]

  qwen3-vl-32b-bf16:
    hf_id: "Qwen/Qwen3-VL-32B-Instruct"
    family: "qwen3-vl"
    role: "vlm-accuracy-baseline"
    quantization: "bf16"
    notes: "BF16 reference for quant-accuracy delta studies."
    # BF16 weights = ~64GB → only ~17GB left for KV. 16K context is a safe
    # cap; bumping to 32K may force vLLM to refuse startup on this GPU.
    backend_args:
      vllm: ["--max-model-len=16384", "--no-enable-prefix-caching"]
      sglang: ["--context-length=16384"]

  qwen3-vl-30b-a3b-fp8:
    hf_id: "Qwen/Qwen3-VL-30B-A3B-Instruct-FP8"
    family: "qwen3-vl"
    role: "vlm-moe"
    quantization: "fp8"
    notes: "MoE (30B total / 3B active); ~31GB at FP8, sweet spot on 96GB. Bandwidth-thesis stress test. TRT-LLM 1.2.1 cannot run it on Blackwell (SM_120) — see comment below."
    unsupported_backends:
      trtllm: "TRT-LLM 1.2.1 fused-MoE (CUTLASS→DeepGEMM JIT) hard-checks SM_90; PRO 6000 is SM_120"
    #
    # ⚠ TRT-LLM 1.2.1 incompatibility (Blackwell SM_120 only):
    # the default `CUTLASS` fused-MoE backend dispatches to a DeepGEMM JIT
    # path whose compiler hard-checks for SM_90 (Hopper). On a PRO 6000
    # (SM_120) startup fails with:
    #   `DeepGEMM only supports Hopper (SM90) architectures, but current
    #    device compute capability is 120.`
    # at `fused_moe_cutlass.py:441 → run_moe`. Same kernel-availability
    # shape of issue as Nemotron-Omni FP8 on SGLang SM_120.
    # Sweeps below pin `backends: [vllm, sglang]`. A per-model
    # trtllm-vlm.yml override that sets `moe_config.backend: DEEPGEMM`
    # (or TRITON/TRTLLM) might unblock TRT-LLM in the future, but
    # changes the global config so it's not safe without per-model
    # YAML routing — flagged in docs/findings/nemotron-omni-on-trtllm.md.
    # Detailed write-up: docs/findings/qwen3-vl-30b-a3b-fp8-on-trtllm.md (TBD).
    backend_args:
      vllm: ["--max-model-len=32768", "--no-enable-prefix-caching"]
      sglang: ["--context-length=32768"]

  qwen3.6-27b-fp8:
    hf_id: "Qwen/Qwen3.6-27B-FP8"
    family: "qwen3.6"
    role: "dense-text"
    quantization: "fp8"
    notes: "Aspirationally TRT-LLM home turf (dense + Blackwell FP8 + stable shapes). TRT-LLM 1.2.1 cannot load it yet — see comment below."
    # Smaller weights (~27GB) leave more room for KV; could go to 65536 if
    # a longer-context experiment needs it.
    #
    # ⚠ TRT-LLM 1.2.1 incompatibility: the checkpoint reports model_type
    # `qwen3_5` (hybrid attention + Mamba/SSM). The transformers build TRT-LLM
    # ships against doesn't register that arch, so loading fails with
    # `KeyError: 'qwen3_5'`. vLLM and SGLang have native support. See
    # docs/findings/qwen3.6-on-trtllm.md.
    unsupported_backends:
      trtllm: "TRT-LLM 1.2.1 transformers registry missing qwen3_5 arch (KeyError on load)"
    backend_args:
      vllm: ["--max-model-len=32768"]
      sglang: ["--context-length=32768"]

  gemma-4-31b-it-fp8:
    hf_id: "RedHatAI/gemma-4-31B-it-FP8-block"
    family: "gemma-4"
    role: "vlm-google"
    quantization: "fp8"
    notes: "Google Gemma 4 31B dense VLM (text+image+video, 256K ctx). RedHatAI FP8-block community quant (Google ships BF16 only). ~31GB at FP8 → fits 96GB with comfortable KV room; cross-vendor twin to qwen3-vl-32b-fp8 and brings the first video-capable modality into the matrix."
    # ⚠ TRT-LLM 1.2.1 incompatibility (expected, unverified on this host):
    # Gemma 4 is an April-2026 release; TRT-LLM 1.2.1's bundled transformers
    # almost certainly doesn't register the `gemma4` arch — same KeyError
    # failure mode as qwen3_5 (qwen3.6-27b-fp8) and NemotronH_Nano_Omni
    # (nemotron-omni-fp8). Pinned out until TRT-LLM is bumped; revisit then.
    # When unblocked, also check whether Gemma3's per-arch trtllm constraints
    # carry to Gemma 4 (FLASHINFER attn backend, chunked prefill off — see
    # TensorRT-LLM/examples/models/core/multimodal/README.md §Gemma3).
    unsupported_backends:
      trtllm: "TRT-LLM 1.2.1 transformers registry expected to be missing gemma4 arch (Apr-2026 release); revisit after TRT-LLM bump"
    backend_args:
      vllm: ["--max-model-len=32768"]
      sglang: ["--context-length=32768"]

  nemotron-omni-fp8:
    hf_id: "nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-FP8"
    family: "nemotron"
    role: "nv-multimodal-moe"
    quantization: "fp8"
    notes: "NV-tuned multimodal MoE on NV silicon. Calibrated FP8 checkpoint published by NVIDIA — no runtime quant needed (NVFP4 variant also available for smaller GPUs)."
    # HF repo ships custom modeling code; vLLM and SGLang refuse to load
    # without --trust-remote-code (HF default is off).
    # First-run cold cache: ~280s download + ~150s safetensors load + compile
    # blew past the 600s default. Bump to 30 min; subsequent runs hit the
    # HF cache and finish in ~120s.
    ready_timeout_s: 1800
    # --no-enable-flashinfer-autotune: vLLM's flashinfer autotuner uses a
    # cuBLASLt-based bmm_fp8 baseline (tactic -1) that aborts with
    # "library was not initialized" on SM_120 (RTX PRO 6000 Blackwell is
    # workstation/pro Blackwell, not data-center SM_100). Disabling
    # autotune lets the SM_120 cutlass FP8 path run directly.
    #
    # ⚠ sglang incompatible on this GPU: the fused-MoE triton kernel for
    # ModelOpt FP8 (modelopt_quant.py:1104 → moe_runner/triton.py:147)
    # has no tuning config for RTX PRO 6000; the default it falls back to
    # asks for 147 KB shared memory per SM but SM_120 has ~100 KB →
    # `OutOfResources` at JIT compile time. --moe-runner-backend is
    # ignored on the modelopt path; --disable-cuda-graph only delays the
    # crash to first generation request.
    #
    # ⚠ trtllm 1.2.1 incompatible: the PyTorch backend doesn't register
    # `NemotronH_Nano_Omni_Reasoning_V3` →
    # `ValueError: Unknown architecture for AutoModelForCausalLM`.
    # Same class of issue as the qwen3_5 arch gap.
    #
    # Net effect: this GPU's only working path is vllm until either (a)
    # sglang ships an SM_120 fused-MoE config or modelopt_quant honors
    # --moe-runner-backend, and (b) trtllm registers the NemotronH
    # multimodal arch.
    unsupported_backends:
      sglang: "Triton fused-MoE asks 147KB shmem on modelopt FP8; SM_120 has ~100KB → OutOfResources at JIT"
      trtllm: "TRT-LLM 1.2.1 PyTorch backend rejects NemotronH_Nano_Omni_Reasoning_V3 arch"
    backend_args:
      vllm: ["--max-model-len=32768", "--trust-remote-code", "--no-enable-flashinfer-autotune"]
      sglang: ["--context-length=32768", "--trust-remote-code"]

  # ─── NitroGen policy models ────────────────────────────────────────────
  # The NitroGen MODEL (500M params, ckpt nvidia/NitroGen:ng.pt) at different
  # precision/denoise-step settings. `quantization` is recorded on the result;
  # precision/--steps ride on `backend_args.nitrogen` (the `nitrogen` family key,
  # applied to every nitrogen-* engine backend). The execution engine
  # (eager/compile/cudagraph/tensorrt/onnx) is the BACKEND this model runs on,
  # not part of the model. bf16-16step is the accuracy/latency reference.
  nitrogen-500m-bf16:
    family: "nitrogen"
    role: "policy-reference"
    ckpt: "nvidia/NitroGen:ng.pt"          # `hf download nvidia/NitroGen ng.pt` on the instance
    quantization: "bf16"
    notes: "BF16 reference; accuracy-vs-gold baseline for the quant delta."
    backend_args:
      nitrogen: ["--precision=bf16", "--steps=16"]
  nitrogen-500m-fp8:
    family: "nitrogen"
    role: "policy-quant"
    ckpt: "nvidia/NitroGen:ng.pt"
    quantization: "fp8"
    notes: "FP8 quant of the DiT + vision tower; same 16 denoise steps."
    backend_args:
      nitrogen: ["--precision=fp8", "--steps=16"]
  nitrogen-500m-fp8-4step:
    family: "nitrogen"
    role: "policy-quant-fast"
    ckpt: "nvidia/NitroGen:ng.pt"
    quantization: "fp8"
    notes: "FP8 + reduced denoise steps (4) — latency floor; check accuracy cost."
    backend_args:
      nitrogen: ["--precision=fp8", "--steps=4"]
  nitrogen-500m-nvfp4:
    family: "nitrogen"
    role: "policy-quant-blackwell"
    ckpt: "nvidia/NitroGen:ng.pt"
    quantization: "nvfp4"
    notes: "NVFP4 — Blackwell-only datatype (PRO 6000 / 5090; not H200 SM_90)."
    backend_args:
      nitrogen: ["--precision=nvfp4", "--steps=16"]

# Headline model for ad-hoc single runs. Sweeps below override this per round.
default_model: qwen3-vl-32b-fp8

# ─── Backends ──────────────────────────────────────────────────────────
# Launcher params only. Model HF id resolved from the active round at run
# time (sweep round, --model override, or default_model).
backends:
  vllm:
    base_url: "http://localhost:8000/v1"
    port: 8000
    # Backend-level args here are GPU-shape-only (memory ceiling +
    # concurrency hint). Anything model-specific lives on
    # `models.<id>.backend_args.vllm`:
    #   --max-model-len     — per-model, since the cap depends on weight
    #                         footprint vs. this GPU's VRAM.
    #   --no-enable-prefix-caching
    #                       — per-model. vLLM's default is ON. Qwen3-VL
    #                         hits a deepstack/chunked-prefill bug with
    #                         prefix caching on (see SMOKE_TESTS.md
    #                         "Common failures"); we disable on those
    #                         models specifically. Other multimodal
    #                         models (Nemotron Omni) use a different
    #                         architecture and stay on the vLLM default.
    #   --quantization      — per-model runtime override (e.g., loading
    #                         BF16 weights as FP8).
    extra_args:
      - "--gpu-memory-utilization=0.90"
      - "--max-num-seqs=32"
    variants:
      eager: ["--enforce-eager"]
      chunked_off: ["--no-enable-chunked-prefill"]

  sglang:
    base_url: "http://localhost:30000/v1"
    port: 30000
    # Per-request context caps live on each model's backend_args block
    # (SGLang flag: `--context-length`). Same reasoning as vllm.
    extra_args: []
    variants: {}

  # NitroGen execution-engine backends. One ZMQ runtime (serve_nitrogen.py) per
  # engine; `transport: zmq` tells the runner to use NitrogenReasoner (not an
  # OpenAI client) and tells run_all_scenarios.sh to launch serve_nitrogen.py.
  # Each backend = one engine that RUNS the NitroGen model (parallel to how vllm
  # runs Qwen3-VL). You run NitroGen on exactly ONE of these per run, not a combo.
  # `family: nitrogen` lets the model's `backend_args.nitrogen` (precision/steps)
  # apply to all of them. `--exec` selects the engine; `--seed` pins denoising.
  nitrogen-eager:
    transport: zmq
    family: nitrogen
    base_url: "tcp://localhost:5555"
    port: 5555
    extra_args: ["--exec=eager", "--seed=0"]
  nitrogen-compile:
    transport: zmq
    family: nitrogen
    base_url: "tcp://localhost:5555"
    port: 5555
    extra_args: ["--exec=compile", "--seed=0"]
  nitrogen-cudagraph:
    transport: zmq
    family: nitrogen
    base_url: "tcp://localhost:5555"
    port: 5555
    extra_args: ["--exec=cudagraph", "--seed=0"]
  nitrogen-tensorrt:
    transport: zmq
    family: nitrogen
    base_url: "tcp://localhost:5555"
    port: 5555
    extra_args: ["--exec=tensorrt", "--seed=0"]
  nitrogen-onnx:
    transport: zmq
    family: nitrogen
    base_url: "tcp://localhost:5555"
    port: 5555
    extra_args: ["--exec=onnxruntime", "--seed=0"]

  trtllm:
    base_url: "http://localhost:8002/v1"
    port: 8002
    # `backend:` selects the trtllm-serve execution path. Allowed values:
    #   pytorch     — PyTorch dispatch (HF weights direct; day-0 model coverage,
    #                 only path supporting Qwen3-VL / Qwen3.6 / Nemotron Omni).
    #   trtllm      — AOT-compiled TRT engine (legacy; dense-text strong on
    #                 stable shapes, multimodal coverage limited; check
    #                 https://nvidia.github.io/TensorRT-LLM/models/supported-models.html).
    #                 Maps to trtllm-serve `--backend tensorrt`.
    #   _autodeploy — experimental auto-routing path; not for headline runs.
    backend: pytorch
    extra_args:
      - "--extra_llm_api_options=benchmarks/configs/trtllm-vlm.yml"
    variants: {}

# ─── Sweeps ────────────────────────────────────────────────────────────
# A sweep is a named ordered list of rounds. Each round can set:
#   model:    id from `models:` (defaults to `default_model`)
#   variant:  variant name from `backends.<backend>.variants` (defaults to none)
# Optional `backends:` field on the sweep limits which backends each round
# runs on; default is all three.
#
# Run via:  python -m benchmarks.runner --sweep <name>   (or --gpu rtx_pro6000 --sweep <name>)
sweeps:
  # All candidate models on all three backends. 4 rounds × 3 backends = 12 runs.
  models:
    rounds:
      # Per-backend filtering — including which (model, backend) pairs are
      # hardware/version-incompatible — is now driven by each model's
      # `unsupported_backends:` field. Sweep mode silently skips those
      # combinations. Single-round invocations (`--backends X --model Y`)
      # are also rejected via the same field.
      - model: qwen3-vl-32b-fp8
      # - model: qwen3-vl-32b-bf16
      - model: qwen3-vl-30b-a3b-fp8
      - model: qwen3.6-27b-fp8
      - model: gemma-4-31b-it-fp8
      - model: nemotron-omni-fp8

  # vllm flag-knob comparison on the default model. 3 vllm runs.
  vllm_knobs:
    backends: [vllm]
    rounds:
      - {}                          # baseline (no variant)
      - variant: eager
      - variant: chunked_off

  # NitroGen inference-optimization study: one 500M policy across execution
  # backends × precision × denoise steps. bf16/eager is the reference; each
  # other round is scored for latency/throughput/GPU AND accuracy-vs-gold.
  # Run against the NitroGen scenarios:
  #   python -m benchmarks.runner --gpu rtx_pro6000 --sweep nitrogen-backends \
  #       --scenarios-dir tests/smoke/scenarios_nitrogen
  nitrogen-backends:
    rounds:
      - {model: nitrogen-500m-bf16,      backends: [nitrogen-eager]}      # reference
      - {model: nitrogen-500m-bf16,      backends: [nitrogen-compile]}
      - {model: nitrogen-500m-bf16,      backends: [nitrogen-cudagraph]}
      - {model: nitrogen-500m-fp8,       backends: [nitrogen-tensorrt]}
      - {model: nitrogen-500m-fp8,       backends: [nitrogen-onnx]}
      - {model: nitrogen-500m-fp8-4step, backends: [nitrogen-tensorrt]}
      - {model: nitrogen-500m-nvfp4,     backends: [nitrogen-tensorrt]}   # Blackwell-only

  # Full matrix — every model × every variant on the relevant backends.
  # Variants here are vllm-only; rounds without a variant run on all three.
  full:
    rounds:
      - {model: qwen3-vl-32b-fp8}
      - {model: qwen3-vl-32b-fp8,  variant: eager,       backends: [vllm]}
      - {model: qwen3-vl-32b-fp8,  variant: chunked_off, backends: [vllm]}
      # - {model: qwen3-vl-32b-bf16}
      - {model: qwen3-vl-30b-a3b-fp8}   # trtllm dropped via unsupported_backends
      - {model: qwen3.6-27b-fp8}        # trtllm dropped via unsupported_backends
      - {model: gemma-4-31b-it-fp8}     # trtllm dropped via unsupported_backends (until bump)
      - {model: nemotron-omni-fp8}      # sglang+trtllm dropped via unsupported_backends

# ─── Aux ───────────────────────────────────────────────────────────────
# Placeholder blocks for tools wired up later. Not read by the runner today.
aux:
  modelopt:
    quant: fp8
    calibration_samples: 512
  triton:
    grpc_url: "localhost:8001"
    ensemble_name: "vlm_pipeline_ensemble"
