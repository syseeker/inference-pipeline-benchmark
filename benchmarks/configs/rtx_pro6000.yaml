# RTX PRO 6000 Blackwell (Server Edition)
#
# Schema (one GPU = one yaml):
#   models:          one block per candidate model. Keys = stable ids.
#                    `backend_args` is the rare per-backend launch flag a
#                    model needs (e.g. runtime quant when the weights are
#                    BF16 but the runtime should load them as FP8).
#   default_model:   pointer into `models`. Single-run target — change this
#                    one line and re-run to swap the model on all backends.
#   backends:        launcher params (HTTP url, port, extra_args).
#                    `variants` are additive flag sets used by sweeps and
#                    by `--variant <name>` for one-off comparisons.
#   sweeps:          named ordered lists of rounds. The runner iterates
#                    each round across the listed backends. Use sweeps to
#                    auto-run multi-model or multi-variant benchmarks in
#                    one session. Run via `--sweep <name>`.
#   aux:             placeholder blocks for tools wired up later.
#
# See docs/models.md for per-GPU pick rationale, docs/capacity.md for fit.

display_name: "RTX PRO 6000 Blackwell Server Edition"
arch: blackwell
vram_gb: 96
mem_type: GDDR7
peak_bandwidth_tbps: 1.6      # check vs. datasheet at run time
nvlink: false
pcie_gen: 5
mig_supported: true

driver: "unknown"             # filled in by scripts/gpu_probe.sh
cuda: "unknown"

tensor_parallel: 1

# ─── Models ────────────────────────────────────────────────────────────
# All HF ids — vllm, sglang, and trtllm-serve all pull on first launch
# into $HF_HOME (default ~/.cache/huggingface/hub/) and share the cache.
models:
  qwen3-vl-32b-fp8:
    hf_id: "Qwen/Qwen3-VL-32B-Instruct-FP8"
    family: "qwen3-vl"
    role: "vlm-headline"
    quantization: "fp8"
    notes: "33GB weights + comfortable KV/ctx room on 96GB."
    # 32K cap: model's HF default is 256K, KV reservation for that won't fit
    # on 96GB next to 33GB weights. 32K is 16x our scenario prompts.
    # `--no-enable-prefix-caching`: Qwen3-VL deepstack + chunked prefill
    # bug; remove once upstream fixes (see SMOKE_TESTS.md).
    backend_args:
      vllm: ["--max-model-len=32768", "--no-enable-prefix-caching"]
      sglang: ["--context-length=32768"]

  qwen3-vl-32b-bf16:
    hf_id: "Qwen/Qwen3-VL-32B-Instruct"
    family: "qwen3-vl"
    role: "vlm-accuracy-baseline"
    quantization: "bf16"
    notes: "BF16 reference for quant-accuracy delta studies."
    # BF16 weights = ~64GB → only ~17GB left for KV. 16K context is a safe
    # cap; bumping to 32K may force vLLM to refuse startup on this GPU.
    backend_args:
      vllm: ["--max-model-len=16384", "--no-enable-prefix-caching"]
      sglang: ["--context-length=16384"]

  qwen3-vl-30b-a3b-fp8:
    hf_id: "Qwen/Qwen3-VL-30B-A3B-Instruct-FP8"
    family: "qwen3-vl"
    role: "vlm-moe"
    quantization: "fp8"
    notes: "MoE (30B total / 3B active); ~31GB at FP8, sweet spot on 96GB. Bandwidth-thesis stress test."
    backend_args:
      vllm: ["--max-model-len=32768", "--no-enable-prefix-caching"]
      sglang: ["--context-length=32768"]

  qwen3.6-27b-fp8:
    hf_id: "Qwen/Qwen3.6-27B-FP8"
    family: "qwen3.6"
    role: "dense-text"
    quantization: "fp8"
    notes: "Aspirationally TRT-LLM home turf (dense + Blackwell FP8 + stable shapes). TRT-LLM 1.2.1 cannot load it yet — see comment below."
    # Smaller weights (~27GB) leave more room for KV; could go to 65536 if
    # a longer-context experiment needs it.
    #
    # ⚠ TRT-LLM 1.2.1 incompatibility: the checkpoint reports model_type
    # `qwen3_5` (hybrid attention + Mamba/SSM). The transformers build TRT-LLM
    # ships against doesn't register that arch, so loading fails with
    # `KeyError: 'qwen3_5'`. vLLM and SGLang have native support. Sweeps
    # below pin `backends: [vllm, sglang]` for this model. See
    # docs/findings/qwen3.6-on-trtllm.md (TBD).
    backend_args:
      vllm: ["--max-model-len=32768"]
      sglang: ["--context-length=32768"]

  nemotron-omni-fp8:
    hf_id: "nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-FP8"
    family: "nemotron"
    role: "nv-multimodal-moe"
    quantization: "fp8"
    notes: "NV-tuned multimodal MoE on NV silicon. Calibrated FP8 checkpoint published by NVIDIA — no runtime quant needed (NVFP4 variant also available for smaller GPUs)."
    # HF repo ships custom modeling code; vLLM and SGLang refuse to load
    # without --trust-remote-code (HF default is off).
    # First-run cold cache: ~280s download + ~150s safetensors load + compile
    # blew past the 600s default. Bump to 30 min; subsequent runs hit the
    # HF cache and finish in ~120s.
    ready_timeout_s: 1800
    # --no-enable-flashinfer-autotune: vLLM's flashinfer autotuner uses a
    # cuBLASLt-based bmm_fp8 baseline (tactic -1) that aborts with
    # "library was not initialized" on SM_120 (RTX PRO 6000 Blackwell is
    # workstation/pro Blackwell, not data-center SM_100). Disabling
    # autotune lets the SM_120 cutlass FP8 path run directly.
    #
    # ⚠ sglang incompatible on this GPU: the fused-MoE triton kernel for
    # ModelOpt FP8 (modelopt_quant.py:1104 → moe_runner/triton.py:147)
    # has no tuning config for RTX PRO 6000; the default it falls back to
    # asks for 147 KB shared memory per SM but SM_120 has ~100 KB →
    # `OutOfResources` at JIT compile time. --moe-runner-backend is
    # ignored on the modelopt path; --disable-cuda-graph only delays the
    # crash to first generation request.
    #
    # ⚠ trtllm 1.2.1 incompatible: the PyTorch backend doesn't register
    # `NemotronH_Nano_Omni_Reasoning_V3` →
    # `ValueError: Unknown architecture for AutoModelForCausalLM`.
    # Same class of issue as the qwen3_5 arch gap.
    #
    # Net effect: sweeps below pin nemotron-omni to [vllm] only on this
    # GPU until either (a) sglang ships an SM_120 fused-MoE config or
    # modelopt_quant honors --moe-runner-backend, and (b) trtllm registers
    # the NemotronH multimodal arch.
    backend_args:
      vllm: ["--max-model-len=32768", "--trust-remote-code", "--no-enable-flashinfer-autotune"]
      sglang: ["--context-length=32768", "--trust-remote-code"]

# Headline model for ad-hoc single runs. Sweeps below override this per round.
default_model: qwen3-vl-32b-fp8

# ─── Backends ──────────────────────────────────────────────────────────
# Launcher params only. Model HF id resolved from the active round at run
# time (sweep round, --model override, or default_model).
backends:
  vllm:
    base_url: "http://localhost:8000/v1"
    port: 8000
    # Backend-level args here are GPU-shape-only (memory ceiling +
    # concurrency hint). Anything model-specific lives on
    # `models.<id>.backend_args.vllm`:
    #   --max-model-len     — per-model, since the cap depends on weight
    #                         footprint vs. this GPU's VRAM.
    #   --no-enable-prefix-caching
    #                       — per-model. vLLM's default is ON. Qwen3-VL
    #                         hits a deepstack/chunked-prefill bug with
    #                         prefix caching on (see SMOKE_TESTS.md
    #                         "Common failures"); we disable on those
    #                         models specifically. Other multimodal
    #                         models (Nemotron Omni) use a different
    #                         architecture and stay on the vLLM default.
    #   --quantization      — per-model runtime override (e.g., loading
    #                         BF16 weights as FP8).
    extra_args:
      - "--gpu-memory-utilization=0.90"
      - "--max-num-seqs=32"
    variants:
      eager: ["--enforce-eager"]
      chunked_off: ["--no-enable-chunked-prefill"]

  sglang:
    base_url: "http://localhost:30000/v1"
    port: 30000
    # Per-request context caps live on each model's backend_args block
    # (SGLang flag: `--context-length`). Same reasoning as vllm.
    extra_args: []
    variants: {}

  trtllm:
    base_url: "http://localhost:8002/v1"
    port: 8002
    # `backend:` selects the trtllm-serve execution path. Allowed values:
    #   pytorch     — PyTorch dispatch (HF weights direct; day-0 model coverage,
    #                 only path supporting Qwen3-VL / Qwen3.6 / Nemotron Omni).
    #   trtllm      — AOT-compiled TRT engine (legacy; dense-text strong on
    #                 stable shapes, multimodal coverage limited; check
    #                 https://nvidia.github.io/TensorRT-LLM/models/supported-models.html).
    #                 Maps to trtllm-serve `--backend tensorrt`.
    #   _autodeploy — experimental auto-routing path; not for headline runs.
    backend: pytorch
    extra_args:
      - "--extra_llm_api_options=/tmp/trtllm-vlm.yml"
    variants: {}

# ─── Sweeps ────────────────────────────────────────────────────────────
# A sweep is a named ordered list of rounds. Each round can set:
#   model:    id from `models:` (defaults to `default_model`)
#   variant:  variant name from `backends.<backend>.variants` (defaults to none)
# Optional `backends:` field on the sweep limits which backends each round
# runs on; default is all three.
#
# Run via:  python -m benchmarks.runner --sweep <name>   (or --gpu rtx_pro6000 --sweep <name>)
sweeps:
  # All candidate models on all three backends. 4 rounds × 3 backends = 12 runs.
  models:
    rounds:
      - model: qwen3-vl-32b-fp8
      # - model: qwen3-vl-32b-bf16
      - model: qwen3-vl-30b-a3b-fp8
      - model: qwen3.6-27b-fp8
        backends: [vllm, sglang]   # trtllm 1.2.1 rejects qwen3_5 arch
      - model: nemotron-omni-fp8
        backends: [vllm]   # sglang OOMs on SM_120, trtllm 1.2.1 rejects arch (see model entry)

  # vllm flag-knob comparison on the default model. 3 vllm runs.
  vllm_knobs:
    backends: [vllm]
    rounds:
      - {}                          # baseline (no variant)
      - variant: eager
      - variant: chunked_off

  # Full matrix — every model × every variant on the relevant backends.
  # Variants here are vllm-only; rounds without a variant run on all three.
  full:
    rounds:
      - {model: qwen3-vl-32b-fp8}
      - {model: qwen3-vl-32b-fp8,  variant: eager,       backends: [vllm]}
      - {model: qwen3-vl-32b-fp8,  variant: chunked_off, backends: [vllm]}
      # - {model: qwen3-vl-32b-bf16}
      - {model: qwen3-vl-30b-a3b-fp8}
      - {model: qwen3.6-27b-fp8,   backends: [vllm, sglang]}   # trtllm 1.2.1 rejects qwen3_5 arch
      - {model: nemotron-omni-fp8, backends: [vllm]}            # sglang OOMs on SM_120, trtllm 1.2.1 rejects arch (see model entry)

# ─── Aux ───────────────────────────────────────────────────────────────
# Placeholder blocks for tools wired up later. Not read by the runner today.
aux:
  modelopt:
    quant: fp8
    calibration_samples: 512
  triton:
    grpc_url: "localhost:8001"
    ensemble_name: "vlm_pipeline_ensemble"
