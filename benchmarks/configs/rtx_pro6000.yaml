# RTX PRO 6000 Blackwell (Server Edition)
display_name: "RTX PRO 6000 Blackwell Server Edition"
arch: blackwell
vram_gb: 96
mem_type: GDDR7
peak_bandwidth_tbps: 1.6      # check vs. datasheet at run time
nvlink: false
pcie_gen: 5
mig_supported: true

driver: "unknown"
cuda: "unknown"

tensor_parallel: 1

frameworks:
  vllm:
    base_url: "http://localhost:8000/v1"
    enable_prefix_caching: true
    enforce_eager: false
    gpu_memory_utilization: 0.90
    max_num_seqs: 64
  sglang:
    base_url: "http://localhost:30000/v1"
    radix_cache: true  # on by default in SGLang 0.4+; no flag needed
    structured_output: ebnf
  trtllm:
    engine_dir: "trt_engines/qwen2-vl-7b-rtx_pro6000-bf16"
    paged_kv_cache: true
    enable_block_reuse: true
    cuda_graph: true
    fp8: false
  modelopt:
    quant: fp8
    calibration_samples: 512
  triton:
    grpc_url: "localhost:8001"
    ensemble_name: "vlm_pipeline_ensemble"

models:
  - id: "qwen2-vl-7b"
    quant: ["bf16"]
    notes: "Stand-in for Qwen3-VL until TRT-LLM adds Qwen3-VL multimodal FP8 export."
  - id: "qwen3-vl-4b"
    quant: ["bf16", "fp8"]
  - id: "qwen3-vl-8b"
    quant: ["bf16", "fp8"]
  - id: "qwen3-vl-32b"
    quant: ["bf16", "fp8"]
  - id: "qwen3-vl-30b-a3b"
    quant: ["bf16", "fp8"]
